apiVersion: v1
kind: Namespace
metadata:
  name: floe-system
  labels:
    app.kubernetes.io/name: floe
    pod-security.kubernetes.io/enforce: restricted

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: floe-gateway
  namespace: floe-system
  labels:
    app.kubernetes.io/name: floe
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: floe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floe
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/floe-dev/floe:latest
          imagePullPolicy: Always
          command: ["/floe", "start"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 4400
              name: http-api
            - containerPort: 4401
              name: http-dash
          envFrom:
            - secretRef:
                name: floe-secrets
            - configMapRef:
                name: floe-config
          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: floe-data-pvc
        - name: tmp-volume
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: floe-service
  namespace: floe-system
spec:
  type: ClusterIP
  ports:
    - port: 4400
      targetPort: 4400
      name: http-api
      protocol: TCP
    - port: 4401
      targetPort: 4401
      name: http-dash
      protocol: TCP
  selector:
    app.kubernetes.io/name: floe

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: floe-data-pvc
  namespace: floe-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
